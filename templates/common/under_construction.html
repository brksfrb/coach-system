{% extends "layout.html" %}

{% block title %}Under Construction{% endblock %}

{% block content %}
<!-- Font Awesome for construction icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    body {
        background: linear-gradient(135deg, #ffb347, #fff8e1);
        background-size: 200% 200%;
        animation: gradientMove 10s ease-in-out infinite;
        background-attachment: fixed;
        background-repeat: no-repeat;
        margin: 0;
        min-height: 100vh;
    }

    @keyframes gradientMove {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }
    }
    .center-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%; /* full viewport height */
    }

    .card {
        background: #fff;
        padding: 50px 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        text-align: center;
        position: relative;
        max-width: 600px;
        width: 90%;
        margin: auto;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        color: #ff6600; /* orange accent */
    }

    p {
        font-size: 18px;
        color: #555;
        margin-bottom: 0;
    }

    /* Floating icons inside card */
    .icon-floating {
        position: absolute;
        font-size: 40px;
        opacity: 0.2;
        animation: float 6s infinite ease-in-out alternate;
        color: #ff6600;
    }

    @keyframes float {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(10deg); }
        100% { transform: translateY(0) rotate(0deg); }
    }

    .icon1 { top: 10px; left: 10px; animation-duration: 5s; }
    .icon2 { top: 20px; right: 20px; animation-duration: 6s; }
    .icon3 { bottom: 20px; left: 30px; animation-duration: 7s; }
    .icon4 { bottom: 15px; right: 25px; animation-duration: 5.5s; }

    @media (max-width: 600px) {
        h1 { font-size: 36px; flex-direction: column; gap: 10px; }
        p { font-size: 16px; }
        .icon-floating { font-size: 30px; }
    }
</style>

<div class="center-wrapper">
    <div class="card">
        <h1>
            <i class="fas fa-crane"></i>
            Under Construction
            <i class="fas fa-hard-hat"></i>
        </h1>
        <p>We’re working hard to bring you something amazing. Check back soon!</p>

        <!-- Subtle floating icons -->
        <i class="fas fa-crane icon-floating icon1"></i>
        <i class="fas fa-wrench icon-floating icon2"></i>
        <i class="fas fa-triangle-exclamation icon-floating icon3"></i>
        <i class="fas fa-hard-hat icon-floating icon4"></i>
    </div>
</div>
{% endblock %}
